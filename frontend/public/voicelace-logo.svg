<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" role="img" aria-labelledby="title desc">
  <title id="title">VoiceLace logo</title>
  <desc id="desc">VoiceLace wordmark with an interlaced waveform logo mark.</desc>
  <defs>
    <linearGradient id="vl-lockup-a" x1="24" y1="36" x2="120" y2="124" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7CE7FF"/>
      <stop offset="0.52" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#FF7A90"/>
    </linearGradient>
    <linearGradient id="vl-lockup-b" x1="124" y1="32" x2="28" y2="128" gradientUnits="userSpaceOnUse">

version = 1
name = "VoiceLace"

[setup]
script = '''
# VoiceLace environment bootstrap (Windows PowerShell friendly)
echo "[env] cwd=$PWD"

# 1) venv
if [ ! -d ".venv" ]; then
  python -m venv .venv
fi

# 2) pip dependencies
./.venv/Scripts/python.exe -m pip install --upgrade pip
./.venv/Scripts/python.exe -m pip install -r backend/requirements.txt
./.venv/Scripts/python.exe -m pip install -r backend/requirements-real.txt

# 3) frontend dependencies
cd frontend
npm install
cd ..

echo "[env] setup done"

'''
